<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronóstico Simplificado Bolsa Infantil Andalucía 2025-26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 350px;
            }
        }
        .result-card {
            background: linear-gradient(135deg, #fbbf24, #f97316); /* Orange Gradient */
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <main class="container mx-auto p-4 md:p-8 max-w-4xl">

        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-orange-700 mb-2">Pronóstico Personalizado para Aspirantes</h1>
            <p class="text-md text-orange-600">Bolsa de Educación Infantil - Andalucía 2025/26</p>
        </header>

        <!-- User Input Block -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 border border-gray-200">
            <h2 class="text-xl font-bold text-orange-800 mb-4 border-b pb-3">Introduce tus datos para la simulación</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="bolsaPos" class="block text-sm font-medium text-gray-700">Tu posición en bolsa</label>
                    <input type="number" id="bolsaPos" value="1200" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 sm:text-sm p-2 transition">
                </div>
                <div>
                    <label for="vacantesAgosto" class="block text-sm font-medium text-gray-700">Vacantes informatizadas (Agosto)</label>
                    <input type="number" id="vacantesAgosto" value="350" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 sm:text-sm p-2 transition">
                </div>
            </div>
            <div class="mt-6 text-center">
                <button id="calculateBtn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-lg transition-transform transform hover:scale-105 shadow-md">
                    Calcular Pronóstico
                </button>
            </div>
        </div>

        <!-- Results Block -->
        <div id="resultsBlock" class="hidden">
             <div id="resultText" class="text-center mb-8 p-6 rounded-2xl shadow-lg text-white result-card">
                 <!-- The result will be injected here -->
             </div>
             <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                 <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-200">
                     <h3 class="text-lg font-bold text-orange-800 mb-2 text-center">Avance Acumulado vs. Tu Posición</h3>
                     <div class="chart-container">
                         <canvas id="cumulativeChart"></canvas>
                     </div>
                 </div>
                 <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-200">
                     <h3 class="text-lg font-bold text-orange-800 mb-2 text-center">Llamamientos Estimados por Mes</h3>
                     <div class="chart-container">
                         <canvas id="monthlyCallsChart"></canvas>
                     </div>
                 </div>
             </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- BASE DATA ---
            // Monthly call forecast based on the provided table (using the average of the range)
            const LLAMAMIENTOS_MENSUALES = {
                'Sept': 950,  // (900+1000)/2
                'Oct': 200,   // (180+220)/2
                'Nov': 145,   // (130+160)/2
                'Dic': 10,    // (5+15)/2
                'Ene': 155,   // (140+170)/2
                'Feb': 60,    // (50+70)/2
                'Mar': 70,    // (60+80)/2
                'Abr': 35,    // (30+40)/2
                'May': 25,    // (20+30)/2
                'Jun': 8      // (5+10)/2 rounded
            };
            const MESES = Object.keys(LLAMAMIENTOS_MENSUALES);
            
            // --- CHART LOGIC ---
            let cumulativeChart, monthlyCallsChart;

            function createCharts() {
                const cumulativeCtx = document.getElementById('cumulativeChart').getContext('2d');
                cumulativeChart = new Chart(cumulativeCtx, { type: 'line', data: { labels: MESES, datasets: [] }, options: getChartOptions('Posiciones avanzadas') });

                const monthlyCtx = document.getElementById('monthlyCallsChart').getContext('2d');
                monthlyCallsChart = new Chart(monthlyCtx, { type: 'bar', data: { labels: MESES, datasets: [] }, options: getChartOptions('Nº de llamamientos') });
            }

            function getChartOptions(yAxisTitle) {
                return {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'bottom' } },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: yAxisTitle, color: '#c2410c' } },
                        x: { ticks: { color: '#333' } }
                    }
                };
            }

            // --- CALCULATION LOGIC ---
            function calculateForecast(posicionRealACompetir) {
                if (posicionRealACompetir <= 0) {
                    return { tipo: 'verano', mesIndex: -1 };
                }

                let llamamientosAcumulados = 0;
                for (let i = 0; i < MESES.length; i++) {
                    const mes = MESES[i];
                    const llamamientosMes = LLAMAMIENTOS_MENSUALES[mes];
                    
                    if (llamamientosAcumulados + llamamientosMes >= posicionRealACompetir) {
                         const semana = Math.ceil((posicionRealACompetir - llamamientosAcumulados) / (llamamientosMes / 4));
                         return { tipo: 'especifico', semana: `Semana ${Math.max(1, semana)}`, mes: mes, mesIndex: i };
                    }
                    llamamientosAcumulados += llamamientosMes;
                }

                return { tipo: 'siguiente_curso', mesIndex: MESES.length };
            }

            // --- UI UPDATE LOGIC ---
            function updateUI(resultado, posicionReal) {
                document.getElementById('resultsBlock').classList.remove('hidden');
                
                const resultTextEl = document.getElementById('resultText');
                switch(resultado.tipo) {
                    case 'verano':
                        resultTextEl.innerHTML = '<p class="text-3xl md:text-4xl font-bold">¡Adjudicación estimada en Verano!</p><p class="text-sm mt-2 opacity-90">Con tu posición, es muy probable que obtengas una vacante en la adjudicación de agosto.</p>';
                        break;
                    case 'siguiente_curso':
                        resultTextEl.innerHTML = `<p class="text-2xl md:text-3xl font-bold">No se estima llamada este curso.</p><p class="text-sm mt-2 opacity-90">Tu posición a competir (${posicionReal}) supera los llamamientos totales previstos para el curso.</p>`;
                        break;
                    case 'especifico':
                        resultTextEl.innerHTML = `
                            <p class="text-3xl md:text-4xl font-bold">Estimación: ${resultado.semana} de ${resultado.mes}</p>
                            <p class="text-sm mt-2 opacity-90">Con una posición a competir de ${posicionReal}, se estima tu incorporación en esa fecha.</p>
                        `;
                        break;
                }

                if (!cumulativeChart) createCharts();
                
                const avanceGeneralAcumulado = MESES.reduce((acc, mes) => {
                    acc.push((acc.length > 0 ? acc[acc.length - 1] : 0) + LLAMAMIENTOS_MENSUALES[mes]);
                    return acc;
                }, []);

                const posicionUsuarioData = new Array(MESES.length).fill(posicionReal > 0 ? posicionReal : null);

                cumulativeChart.data.datasets = [
                    {
                        label: 'Avance General Estimado de la Bolsa',
                        data: avanceGeneralAcumulado,
                        borderColor: '#f97316',
                        backgroundColor: 'rgba(249, 115, 22, 0.2)',
                        fill: true,
                        tension: 0.2
                    },
                    {
                        label: 'Tu Posición a Competir (Tras vacantes)',
                        data: posicionUsuarioData,
                        borderColor: '#4b5563',
                        borderDash: [5, 5],
                        backgroundColor: 'transparent',
                        pointRadius: 0,
                        tension: 0.1
                    }
                ];
                cumulativeChart.update();

                const coloresBarras = MESES.map((_, index) => index === resultado.mesIndex ? '#d97706' : '#fdba74');

                monthlyCallsChart.data.datasets = [{
                    label: 'Llamamientos Mensuales Estimados',
                    data: Object.values(LLAMAMIENTOS_MENSUALES),
                    backgroundColor: coloresBarras,
                    borderRadius: 4
                }];
                monthlyCallsChart.update();
            }

            // --- INITIALIZATION AND EVENT LISTENERS ---
            document.getElementById('calculateBtn').addEventListener('click', () => {
                const posicion = parseInt(document.getElementById('bolsaPos').value);
                const vacantes = parseInt(document.getElementById('vacantesAgosto').value);
                
                const posicionReal = Math.max(0, posicion - vacantes);
                
                const resultado = calculateForecast(posicionReal);
                updateUI(resultado, posicionReal);
            });
            
            // Initial calculation on load
            createCharts();
            document.getElementById('calculateBtn').click();
        });
    </script>
</body>
</html>
